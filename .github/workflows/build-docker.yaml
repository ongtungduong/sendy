name: build-docker

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  setup-job:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      service_name: ${{ steps.set-outputs.outputs.service_name }}
      image_tag: ${{ steps.set-outputs.outputs.image_tag }}
    steps:
      - name: Set outputs
        id: set-outputs
        run: |
          echo "service_name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}" >> $GITHUB_OUTPUT

  docker-build:
    needs: setup-job
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: app
            suffix: ""
          - target: cron
            suffix: "-cron"
    steps:
      - uses: actions/checkout@v6
        name: Check out

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ github.actor }}/${{ needs.setup-job.outputs.service_name }}${{ matrix.suffix }}:${{ needs.setup-job.outputs.image_tag }}
            ${{ github.actor }}/${{ needs.setup-job.outputs.service_name }}${{ matrix.suffix }}:latest
          cache-from: type=registry,ref=${{ github.actor }}/${{ needs.setup-job.outputs.service_name }}${{ matrix.suffix }}:buildcache
          cache-to: type=registry,ref=${{ github.actor }}/${{ needs.setup-job.outputs.service_name }}${{ matrix.suffix }}:buildcache,mode=max